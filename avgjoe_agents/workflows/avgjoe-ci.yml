# .github/workflows/avgjoe-ci.yml
# Generated by AVGJoe DeployerAgent
# This is the DEFAULT template — the agent customises it per feature.

name: AVGJoe CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ── 1. Lint + unit tests ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          pip install -r requirements.txt

      - name: Lint (frontend)
        run: npm run lint

      - name: Unit tests (backend)
        run: pytest tests/unit -v --tb=short
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Unit tests (frontend)
        run: npm test -- --watchAll=false

  # ── 2. Integration tests ─────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: avgjoe_test
          POSTGRES_USER: avgjoe
          POSTGRES_PASSWORD: testpass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - name: Run migrations
        run: python manage.py migrate
        env:
          DATABASE_URL: postgres://avgjoe:testpass@localhost:5432/avgjoe_test
      - name: Integration tests
        run: pytest tests/integration -v
        env:
          DATABASE_URL: postgres://avgjoe:testpass@localhost:5432/avgjoe_test

  # ── 3. E2E tests ─────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start app
        run: npm run start:test &
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ── 4. Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/

  # ── 5. Deploy to staging (on PR merge to main) ───────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/
      - name: Deploy to staging
        run: |
          echo "Deploying to staging …"
          # Replace with your actual deploy command:
          # fly deploy --app avgjoe-staging
          # vercel --prod --token $VERCEL_TOKEN
          # aws s3 sync build/ s3://avgjoe-staging
        env:
          DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  # ── 6. Deploy to production (on release tag) ─────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/
      - name: Deploy to production
        run: |
          echo "Deploying to production …"
          # Replace with your actual deploy command
        env:
          DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      - name: Create Sentry release
        run: |
          npx @sentry/cli releases new ${{ github.ref_name }}
          npx @sentry/cli releases finalize ${{ github.ref_name }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: avgjoe
